<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta property="og:title" content="杜堃 & 韩玉婷 · 新婚快乐">
<meta property="og:description" content="2026年6月14日，我们结婚啦！">
<meta property="og:image" content="https://wy-wmhz.github.io/wedding/photo3.jpg">
<meta property="og:url" content="https://wy-wmhz.github.io/wedding/wedding.html">
<meta property="og:type" content="website">
<title>杜堃 & 韩玉婷 · 新婚快乐</title>
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --rose: #c44d6e;
    --rose-dark: #9b2d4a;
    --gold: #d4a853;
    --gold-light: #f0d78c;
    --cream: #fdf6f0;
    --white: #ffffff;
    --text: #4a3040;
    --text-light: #8a6a7a;
    --shadow: 0 8px 40px rgba(0,0,0,0.08);
  }

  html { scroll-behavior: smooth; }

  body {
    font-family: 'Georgia', 'Noto Serif SC', 'SimSun', 'STSong', serif;
    color: var(--text);
    background: var(--cream);
    overflow-x: hidden;
    -webkit-font-smoothing: antialiased;
  }

  /* ===== Hero ===== */
  .hero {
    position: relative;
    width: 100%;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    overflow: hidden;
    color: white;
  }

  .hero-bg {
    position: absolute;
    inset: 0;
    background: url('photo3.jpg') center/cover no-repeat;
    filter: brightness(0.55) saturate(1.1);
    transform: scale(1.05);
    animation: heroZoom 20s ease-in-out infinite alternate;
  }

  @keyframes heroZoom {
    0% { transform: scale(1.05); }
    100% { transform: scale(1.12); }
  }

  .hero-overlay {
    position: absolute;
    inset: 0;
    background: linear-gradient(to bottom,
      rgba(120,30,50,0.35) 0%,
      rgba(120,30,50,0.15) 50%,
      rgba(120,30,50,0.45) 100%
    );
  }

  .hero-content {
    position: relative;
    z-index: 2;
    padding: 40px 24px;
    animation: fadeInUp 1.2s ease-out;
  }

  @keyframes fadeInUp {
    from { opacity: 0; transform: translateY(40px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .hero-date {
    font-size: 16px;
    letter-spacing: 8px;
    text-transform: uppercase;
    margin-bottom: 24px;
    opacity: 0.9;
  }

  .hero-ampersand {
    font-size: 60px;
    font-family: 'Georgia', 'Times New Roman', serif;
    font-style: italic;
    color: var(--gold);
    display: block;
    margin: 16px 0;
    animation: pulse 2s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.7; transform: scale(1.06); }
  }

  .hero-names {
    font-size: clamp(36px, 6vw, 56px);
    font-weight: 700;
    letter-spacing: 10px;
    line-height: 1.4;
  }

  .hero-names .groom { display: block; }
  .hero-names .bride { display: block; }

  .hero-sub {
    font-size: 18px;
    letter-spacing: 6px;
    margin-top: 24px;
    opacity: 0.85;
  }

  .scroll-hint {
    position: absolute;
    bottom: 40px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 2;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    animation: bounce 2s infinite;
    opacity: 0.7;
  }

  .scroll-hint span { font-size: 12px; letter-spacing: 4px; color: white; }
  .scroll-arrow { font-size: 20px; color: white; }

  @keyframes bounce {
    0%, 100% { transform: translateX(-50%) translateY(0); }
    50% { transform: translateX(-50%) translateY(10px); }
  }

  /* ===== Section Common ===== */
  .section {
    padding: 80px 24px;
    max-width: 800px;
    margin: 0 auto;
    text-align: center;
  }

  .section-title {
    font-size: clamp(22px, 4vw, 28px);
    font-weight: 700;
    letter-spacing: 6px;
    color: var(--rose-dark);
    margin-bottom: 12px;
  }

  .section-line {
    width: 60px;
    height: 2px;
    background: linear-gradient(to right, transparent, var(--gold), transparent);
    margin: 0 auto 40px;
  }

  /* ===== Countdown ===== */
  .countdown-section {
    background: linear-gradient(135deg, #fdf2f5 0%, #fdf6f0 50%, #fdf2f5 100%);
  }

  .countdown-grid {
    display: flex;
    justify-content: center;
    gap: 16px;
    flex-wrap: wrap;
  }

  .countdown-box {
    background: var(--white);
    border-radius: 20px;
    padding: 20px 12px;
    min-width: 80px;
    box-shadow: var(--shadow);
    border: 1px solid rgba(196,77,110,0.1);
    transition: transform 0.3s;
  }

  .countdown-box:hover { transform: translateY(-4px); }

  .countdown-num {
    font-size: clamp(32px, 5vw, 48px);
    font-weight: 700;
    color: var(--rose);
    display: block;
    line-height: 1;
  }

  .countdown-label {
    font-size: 13px;
    color: var(--text-light);
    letter-spacing: 4px;
    margin-top: 8px;
    display: block;
  }

  .countdown-sub {
    margin-top: 28px;
    font-size: 15px;
    color: var(--rose);
    letter-spacing: 4px;
  }

  /* ===== Gallery ===== */
  .gallery-section { background: var(--white); }

  .gallery {
    position: relative;
    border-radius: 20px;
    overflow: hidden;
    box-shadow: var(--shadow);
    max-width: 600px;
    margin: 0 auto;
    background: #1a1a1a;
  }

  .gallery-slide {
    display: none;
    opacity: 0;
    transition: opacity 0.8s ease;
  }

  .gallery-slide img {
    display: block;
    width: 100%;
    height: auto;
    object-fit: contain;
    max-height: 75vh;
  }

  .gallery-slide.active { opacity: 1; }

  .gallery-dots {
    display: flex;
    justify-content: center;
    gap: 10px;
    margin-top: 20px;
  }

  .gallery-dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    background: #dcc;
    border: none;
    cursor: pointer;
    transition: all 0.3s;
  }

  .gallery-dot.active {
    background: var(--rose);
    transform: scale(1.3);
  }

  .gallery-nav {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    background: rgba(255,255,255,0.85);
    border: none;
    width: 44px;
    height: 44px;
    border-radius: 50%;
    font-size: 18px;
    cursor: pointer;
    z-index: 5;
    color: var(--rose);
    box-shadow: 0 2px 12px rgba(0,0,0,0.1);
    transition: all 0.3s;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .gallery-nav:hover { background: white; transform: translateY(-50%) scale(1.1); }
  .gallery-nav.prev { left: 12px; }
  .gallery-nav.next { right: 12px; }

  /* ===== Love Story ===== */
  .story-section { background: linear-gradient(180deg, #fdf6f0, #fdf2f5); }

  .story-card {
    background: var(--white);
    border-radius: 24px;
    padding: 48px 32px;
    box-shadow: var(--shadow);
    border: 1px solid rgba(196,77,110,0.08);
    line-height: 2.4;
    font-size: 17px;
    letter-spacing: 2px;
    position: relative;
  }

  .story-card::before {
    content: '"';
    font-size: 80px;
    font-family: Georgia, serif;
    color: var(--gold-light);
    position: absolute;
    top: 10px;
    left: 24px;
    line-height: 1;
  }

  .story-highlight {
    font-size: 22px;
    font-weight: 700;
    color: var(--rose);
    letter-spacing: 4px;
    margin: 24px 0;
    display: block;
  }

  /* ===== Blessings ===== */
  .blessings-section { background: var(--white); }

  .blessing-tags {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 12px;
    max-width: 500px;
    margin: 0 auto;
  }

  .blessing-tag {
    padding: 12px 24px;
    border-radius: 30px;
    font-size: 16px;
    letter-spacing: 3px;
    border: 1.5px solid rgba(196,77,110,0.2);
    color: var(--rose);
    background: transparent;
    transition: all 0.3s;
  }

  .blessing-tag:hover {
    background: var(--rose);
    color: white;
    border-color: var(--rose);
    transform: scale(1.05);
  }

  /* ===== Footer ===== */
  .footer-section {
    background: linear-gradient(0deg, #3d1525, #6b2a40);
    color: rgba(255,255,255,0.85);
    padding: 60px 24px 48px;
    text-align: center;
  }

  .footer-from {
    font-size: 14px;
    letter-spacing: 4px;
    opacity: 0.7;
  }

  .footer-bro {
    font-size: 18px;
    margin-top: 12px;
    letter-spacing: 4px;
  }

  .footer-heart {
    color: #ff6b8a;
    font-size: 28px;
    display: inline-block;
    animation: heartbeat 1.2s ease-in-out infinite;
    margin: 16px 0;
  }

  @keyframes heartbeat {
    0%, 100% { transform: scale(1); }
    15% { transform: scale(1.3); }
    30% { transform: scale(1); }
    45% { transform: scale(1.3); }
    60% { transform: scale(1); }
  }

  /* ===== Petals ===== */
  .petal {
    position: fixed;
    pointer-events: none;
    z-index: 500;
    animation: petalFall linear forwards;
  }

  @keyframes petalFall {
    0% { transform: translateY(-5vh) rotate(0deg) scale(1); opacity: 0.9; }
    80% { opacity: 0.6; }
    100% { transform: translateY(105vh) rotate(540deg) scale(0.2); opacity: 0; }
  }

  /* ===== Fade-in on scroll ===== */
  .fade-in {
    opacity: 0;
    transform: translateY(30px);
    transition: opacity 0.8s ease, transform 0.8s ease;
  }

  .fade-in.visible { opacity: 1; transform: translateY(0); }

  /* ===== Responsive ===== */
  @media (max-width: 600px) {
    .section { padding: 60px 20px; }
    .hero-names { font-size: 32px; letter-spacing: 6px; }
    .hero-ampersand { font-size: 40px; }
    .hero-date { font-size: 13px; letter-spacing: 5px; }
    .story-card { padding: 36px 24px; font-size: 15px; }
  }
</style>
</head>
<body>

<!-- Hero -->
<section class="hero">
  <div class="hero-bg"></div>
  <div class="hero-overlay"></div>
  <div class="hero-content">
    <p class="hero-date">2026 · 06 · 14</p>
    <div class="hero-names">
      <span class="groom">杜 堃</span>
      <span class="hero-ampersand">&</span>
      <span class="bride">韩 玉 婷</span>
    </div>
    <p class="hero-sub">新 婚 快 乐</p>
  </div>
  <div class="scroll-hint">
    <span>向下滑动</span>
    <div class="scroll-arrow">↓</div>
  </div>
</section>

<!-- Countdown -->
<section class="section countdown-section">
  <h2 class="section-title">幸 福 倒 计 时</h2>
  <div class="section-line"></div>
  <div class="countdown-grid fade-in">
    <div class="countdown-box"><span class="countdown-num" id="days">--</span><span class="countdown-label">天</span></div>
    <div class="countdown-box"><span class="countdown-num" id="hours">--</span><span class="countdown-label">时</span></div>
    <div class="countdown-box"><span class="countdown-num" id="minutes">--</span><span class="countdown-label">分</span></div>
    <div class="countdown-box"><span class="countdown-num" id="seconds">--</span><span class="countdown-label">秒</span></div>
  </div>
  <p class="countdown-sub">🌹 距离幸福时刻越来越近</p>
</section>

<!-- Gallery -->
<section class="section gallery-section">
  <h2 class="section-title">甜 蜜 时 刻</h2>
  <div class="section-line"></div>
  <div class="gallery fade-in" id="gallery">
    <div class="gallery-slide active"><img src="photo1.jpg" alt="婚纱照1"></div>
    <div class="gallery-slide"><img src="photo2.jpg" alt="婚纱照2"></div>
    <div class="gallery-slide"><img src="photo3.jpg" alt="婚纱照3"></div>
    <button class="gallery-nav prev" id="prevBtn">◂</button>
    <button class="gallery-nav next" id="nextBtn">▸</button>
  </div>
  <div class="gallery-dots" id="galleryDots">
    <button class="gallery-dot active" data-index="0"></button>
    <button class="gallery-dot" data-index="1"></button>
    <button class="gallery-dot" data-index="2"></button>
  </div>
</section>

<!-- Story -->
<section class="section story-section">
  <h2 class="section-title">一 路 走 来</h2>
  <div class="section-line"></div>
  <div class="story-card fade-in">
    <p>
      从相识到相知，从相恋到相守<br>
      一路携手走过春夏秋冬
    </p>
    <span class="story-highlight">💒 今天，你们结婚了 💒</span>
    <p>
      愿你们的爱情如美酒般越久越醇<br>
      愿你们的生活如诗篇般浪漫动人<br>
      愿未来的每一天都充满欢笑与温暖
    </p>
  </div>
</section>

<!-- Blessings -->
<section class="section blessings-section">
  <h2 class="section-title">祝 福 满 满</h2>
  <div class="section-line"></div>
  <div class="blessing-tags fade-in">
    <span class="blessing-tag">💕 百年好合</span>
    <span class="blessing-tag">✨ 永结同心</span>
    <span class="blessing-tag">🎊 早生贵子</span>
    <span class="blessing-tag">🌸 白头偕老</span>
    <span class="blessing-tag">💝 琴瑟和鸣</span>
    <span class="blessing-tag">🌺 幸福美满</span>
    <span class="blessing-tag">🎀 相敬如宾</span>
    <span class="blessing-tag">🏠 宜室宜家</span>
  </div>
</section>

<!-- Footer -->
<section class="footer-section">
  <p class="footer-from">FOR MY BEST BRO</p>
  <p class="footer-bro">杜堃 & 韩玉婷</p>
  <div class="footer-heart">❤️</div>
  <p class="footer-bro" style="font-size:14px; opacity:0.7;">兄弟永远挺你</p>
</section>

<script>
// ===== Countdown =====
const weddingDate = new Date('2026-06-14T00:00:00+08:00');

function updateCountdown() {
  const now = new Date();
  const diff = weddingDate - now;

  if (diff <= 0) {
    ['days','hours','minutes','seconds'].forEach(id => {
      document.getElementById(id).textContent = '🎉';
    });
    return;
  }

  document.getElementById('days').textContent = String(Math.floor(diff / 86400000)).padStart(2, '0');
  document.getElementById('hours').textContent = String(Math.floor((diff % 86400000) / 3600000)).padStart(2, '0');
  document.getElementById('minutes').textContent = String(Math.floor((diff % 3600000) / 60000)).padStart(2, '0');
  document.getElementById('seconds').textContent = String(Math.floor((diff % 60000) / 1000)).padStart(2, '0');
}

updateCountdown();
setInterval(updateCountdown, 1000);

// ===== Gallery Carousel =====
let currentSlide = 0;
const slides = document.querySelectorAll('.gallery-slide');
const dots = document.querySelectorAll('.gallery-dot');
const totalSlides = slides.length;

function showSlide(index) {
  slides.forEach(s => { s.style.display = 'none'; s.style.opacity = '0'; });
  dots.forEach(d => d.classList.remove('active'));
  currentSlide = ((index % totalSlides) + totalSlides) % totalSlides;
  slides[currentSlide].style.display = 'block';
  requestAnimationFrame(() => { slides[currentSlide].style.opacity = '1'; });
  dots[currentSlide].classList.add('active');
}

showSlide(0);

document.getElementById('prevBtn').addEventListener('click', () => showSlide(currentSlide - 1));
document.getElementById('nextBtn').addEventListener('click', () => showSlide(currentSlide + 1));
dots.forEach(dot => {
  dot.addEventListener('click', () => showSlide(parseInt(dot.dataset.index)));
});

// Auto-play
setInterval(() => showSlide(currentSlide + 1), 5000);

// Touch swipe
let touchStartX = 0;
document.getElementById('gallery').addEventListener('touchstart', e => {
  touchStartX = e.touches[0].clientX;
});
document.getElementById('gallery').addEventListener('touchend', e => {
  const diff = touchStartX - e.changedTouches[0].clientX;
  if (Math.abs(diff) > 50) showSlide(currentSlide + (diff > 0 ? 1 : -1));
});

// ===== Scroll Fade-in =====
const fadeEls = document.querySelectorAll('.fade-in');
const observer = new IntersectionObserver(entries => {
  entries.forEach(entry => {
    if (entry.isIntersecting) entry.target.classList.add('visible');
  });
}, { threshold: 0.15 });

fadeEls.forEach(el => observer.observe(el));

// ===== Petals =====
function createPetal() {
  const petal = document.createElement('div');
  petal.className = 'petal';
  petal.textContent = ['🌸','🌺','💮','🌷','🌹','✿','🌼','🍂'][Math.floor(Math.random() * 8)];
  petal.style.left = Math.random() * 100 + '%';
  petal.style.fontSize = (14 + Math.random() * 22) + 'px';
  petal.style.animationDuration = (7 + Math.random() * 10) + 's';
  petal.style.animationDelay = Math.random() * 3 + 's';
  document.body.appendChild(petal);
  setTimeout(() => petal.remove(), 15000);
}

setInterval(createPetal, 700);
for (let i = 0; i < 8; i++) setTimeout(createPetal, i * 500);
</script>

</body>
</html>
